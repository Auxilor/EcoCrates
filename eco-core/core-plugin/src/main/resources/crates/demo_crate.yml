name: "Demo Crate"
roll: csgo
can-reroll: true

key: demo_crate # The ID of the key for this crate (configured in /keys/demo_crate.yml)

preview:
  title: Demo Crate
  rows: 6
  forwards-arrow:
    item: arrow name:"&fNext Page"
    row: 6
    column: 6
  backwards-arrow:
    item: arrow name:"&fPrevious Page"
    row: 6
    column: 4
  pages:
    - page: 1
      mask:
        items:
          - gray_stained_glass_pane
          - black_stained_glass_pane
        pattern:
          - "222222222"
          - "211111112"
          - "211011112"
          - "211110112"
          - "211111112"
          - "222222222"
      rewards:
        - id: diamond_sword
          row: 3
          column: 4
        - id: stack_of_emeralds
          row: 4
          column: 6
    - page: 2
      mask:
        items:
          - gray_stained_glass_pane
          - black_stained_glass_pane
        pattern:
          - "222222222"
          - "211111112"
          - "211110112"
          - "211011112"
          - "211111112"
          - "222222222"
      rewards:
        - id: bedrock
          row: 3
          column: 6
        - id: 1000_coins
          row: 4
          column: 4

pay-to-open:
  enabled: false
  price: 5000
  type: coins

placed:
  random-reward:
    enabled: true
    height: 1.5
    delay: 30
    name: "&fYou could win:"
  particles:
    - particle: flame
      animation: spiral
  hologram:
    height: 1.5
    ticks: 200
    frames:
      - tick: 0
        lines:
          - "<g:#56ab2f>&lDEMO CRATE</g:#a8e063>"
          - "&b&lLeft Click to Preview"
          - '&a&lRight click to Open'
      - tick: 100
        lines:
          - "<g:#56ab2f>&lDEMO CRATE</g:#a8e063>"
          - "&a&lLeft Click to Preview"
          - '&b&lRight click to Open'

open-effects:
  - id: send_message
    args:
      message: "Good luck!"
  - id: broadcast
    args:
      message: "%player%&f is opening the %crate%&f!"
  - id: play_sound
    args:
      sound: entity_villager_yes
      volume: 10
      pitch: 1

finish-effects:
  - id: send_message
    args:
      message: "You won %reward%&f!"
  - id: broadcast
    args:
      message: "%player%&f won %reward%&f from the %crate%&f!"
  - id: play_sound
    args:
      sound: entity_generic_explode
      volume: 10
      pitch: 1

rewards:
  - diamond_sword
  - stack_of_emeralds
  - bedrock
  - 1000_coins